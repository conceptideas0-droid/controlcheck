<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body {
        font-family: "SF Pro Rounded", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
        background: linear-gradient(170deg, #f5f7fb 0%, #eef2f7 100%);
        padding: 20px;
        max-width: 600px;
        margin: 0 auto;
        overflow-x: hidden;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 2px solid #d7e3f4;
      }
      .header h2 { color: #0f3b5e; margin: 0; }
      .back-btn {
        position: fixed;
        top: 12px;
        left: 12px;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: none;
        background: #4a5568;
        color: #fff;
        font-size: 20px;
        font-weight: 700;
        cursor: pointer;
        z-index: 1200;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.25);
      }
      .back-btn { display: none !important; }
      .refresh-btn {
        background: linear-gradient(145deg, #6a73c9, #8a95d9); color: white; border: none; padding: 12px;
        border-radius: 12px; width: 100%; font-size: 15px; font-weight: 600;
        cursor: pointer; margin-bottom: 20px;
        box-shadow: 0 10px 18px -10px rgba(106,115,201,0.55);
      }
      .stats-grid {
        display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px;
      }
      .status-tabs {
        display: flex;
        gap: 8px;
        flex-wrap: nowrap;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .status-tab {
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        color: #334155;
        font-size: 12px;
        font-weight: 600;
        border-radius: 999px;
        padding: 6px 10px;
        cursor: pointer;
        flex: 1 1 0;
        text-align: center;
      }
      .status-tab.active[data-status="Total"] { background: #e2e8f0; color: #0f172a; border-color: #94a3b8; }
      .status-tab.active[data-status="In"] { background: #dcfce7; color: #166534; border-color: #86efac; }
      .status-tab.active[data-status="Out"] { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
      .status-tab.active[data-status="Problem"] { background: #fef9c3; color: #854d0e; border-color: #fde68a; }
      .stat-card {
        background: linear-gradient(180deg, #ffffff, #f8fafc); border-radius: 16px; padding: 20px; text-align: center;
        box-shadow: 0 14px 24px -14px rgba(15,23,42,0.35); border: 1px solid #e2e8f0;
      }
      .stat-value { font-size: 32px; font-weight: 700; color: #2563eb; margin-bottom: 5px; }
      .stat-label { color: #64748b; font-size: 12px; text-transform: uppercase; }
      .section {
        background: linear-gradient(180deg, #ffffff, #f8fafc); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; box-shadow: 0 14px 24px -14px rgba(15,23,42,0.35);
      }
      .section.status-total { border-color: #cbd5e1; background: linear-gradient(180deg, #ffffff, #f8fafc); }
      .section.status-in { border-color: #86efac; background: linear-gradient(180deg, #f0fdf4, #ecfdf5); }
      .section.status-out { border-color: #fca5a5; background: linear-gradient(180deg, #fff1f2, #fef2f2); }
      .section.status-problem { border-color: #fde68a; background: linear-gradient(180deg, #fefce8, #fef9c3); }
      .section-title { font-size: 16px; font-weight: 600; color: #0f172a; margin-bottom: 15px; }
      .list-item {
        display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e2e8f0;
      }
      .type-row-btn {
        width: 100%;
        border: 1px solid #dbe5f2;
        background: #f8fbff;
        padding: 8px 10px;
        margin: 0 0 6px 0;
        text-align: left;
        cursor: pointer;
        border-radius: 10px;
        transition: background-color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      }
      .type-row-btn:hover {
        background: #f1f6ff;
        border-color: #c7d8f4;
      }
      .type-row-btn:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.28);
      }
      .type-row-main {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .type-name {
        display: inline-flex;
        align-items: center;
        font-size: 15px;
        font-weight: 600;
        color: #0f172a;
      }
      .type-row-right {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .toggle-icon {
        color: #1e3a8a;
        font-size: 18px;
        font-weight: 700;
        width: 16px;
        text-align: right;
        line-height: 1;
      }
      .sub-list {
        margin: 8px 0 12px 20px;
        border-left: 2px solid #e2e8f0;
        padding-left: 10px;
      }
      .sub-list .list-item {
        padding: 8px 0;
      }
      .sub-list .list-item span:first-child {
        color: #334155;
        font-size: 13px;
      }
      .list-item:last-child { border-bottom: none; }
      .badge {
        padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      }
      .badge-in { background: #dcfce7; color: #166534; }
      .badge-out { background: #fee2e2; color: #991b1b; }
      .badge-problem { background: #fef9c3; color: #854d0e; }
      .activity-item { padding: 10px 0; border-bottom: 1px solid #e2e8f0; }
      .activity-item:last-child { border-bottom: none; }
      .loading { text-align: center; padding: 30px; color: #64748b; }
      .scrollable {
        max-height: 220px;
        overflow-y: auto;
        padding-right: 8px;
        -webkit-overflow-scrolling: touch;
      }
      @media (max-width: 768px) {
        body { padding: 14px; }
        .section, .stat-card { padding: 14px; }
        .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
        .scrollable { max-height: 220px; }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h2>📊 대시보드 Dashboard</h2>
      <button class="back-btn" type="button" onclick="goToMenu()" aria-label="Main Menu">&#8592;</button>
    </div>
   
      <button class="refresh-btn" onclick="loadDashboard()">🔄 새로고침 Refresh Dashboard</button>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="totalItems">-</div>
        <div class="stat-label" id="summaryLabel1">총 품목 Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="inStock">-</div>
        <div class="stat-label" id="summaryLabel2">입고 In</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="outStock">-</div>
        <div class="stat-label" id="summaryLabel3">출고 Out</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="problemItems">-</div>
        <div class="stat-label" id="summaryLabel4">불량 Problem</div>
      </div>
    </div>
   
    <div class="section status-total" id="itemsSection">
      <div class="section-title">🏷️ 품목 Items</div>
      <div id="typeTabs" class="status-tabs"></div>
      <div id="typeStats" class="scrollable"></div>
    </div>

    <div class="section status-total" id="locationsSection">
      <div class="section-title">📍 위치별 품목 Items by Location</div>
      <div id="locationTabs" class="status-tabs"></div>
      <div id="locationStats" class="scrollable"></div>
    </div>
   
    <div class="section">
      <div class="section-title">⏱️ 최근 활동 Recent Activity</div>
      <div id="recentActivity"></div>
    </div>
   
    <script>
      const BACKEND_API_BASE = 'https://inventory-proxy.conceptideas0.workers.dev/api';
      const FETCH_TIMEOUT_MS = 30000;
      const STATUS_TABS = Object.freeze([
        { key: 'Total', label: '전체 Total' },
        { key: 'In', label: '입고 In' },
        { key: 'Out', label: '출고 Out' },
        { key: 'Problem', label: '불량 Problem' }
      ]);
      let typeStatusTab = 'Total';
      let locationStatusTab = 'Total';
      let latestDashboardData = null;
      const expandedTypes = Object.create(null);

      function parseJsonResponse(response) {
        return response.text().then(function(raw) {
          var data = null;
          try {
            data = raw ? JSON.parse(raw) : null;
          } catch (e) {
            throw new Error(String(raw || '').trim() || 'Invalid JSON response');
          }
          if (!response.ok) {
            var message = data && (data.message || data.error);
            throw new Error(message || ('HTTP ' + response.status));
          }
          return data;
        });
      }

      function fetchWithTimeout(url, options) {
        var controller = new AbortController();
        var timer = setTimeout(function() { controller.abort(); }, FETCH_TIMEOUT_MS);
        return fetch(url, Object.assign({}, options || {}, { signal: controller.signal }))
          .finally(function() { clearTimeout(timer); })
          .catch(function(err) {
            if (err && err.name === 'AbortError') throw new Error('Request timed out');
            throw err;
          });
      }

      function getAuthToken() {
        try {
          return sessionStorage.getItem('inventoryLoginToken') || '';
        } catch (e) {
          return '';
        }
      }

      function callApiGet(action, params) {
        var url = new URL(BACKEND_API_BASE);
        url.searchParams.set('api', action);
        var authToken = getAuthToken();
        if (authToken) {
          url.searchParams.set('authToken', authToken); url.searchParams.set('token', authToken);
        }
        Object.keys(params || {}).forEach(function(key) {
          if (params[key] !== undefined && params[key] !== null) {
            url.searchParams.set(key, String(params[key]));
          }
        });
        return fetchWithTimeout(url.toString(), { mode: 'cors' }).then(parseJsonResponse);
      }

      function isApiErrorObject(value) {
        return Boolean(value && typeof value === 'object' && value.success === false && value.message);
      }

      function formatDateDisplayLocal(dateString) {
        if (!dateString) return 'Unknown';
        try {
          var date = new Date(dateString);
          if (isNaN(date.getTime())) return String(dateString).split(' ')[0];
          return new Intl.DateTimeFormat('en-CA', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit'
          }).format(date);
        } catch (e) {
          return String(dateString);
        }
      }

      function formatDateTimeDisplayLocal(dateString) {
        if (!dateString) return 'Unknown';
        try {
          var date = new Date(dateString);
          if (isNaN(date.getTime())) return String(dateString);
          return new Intl.DateTimeFormat('en-CA', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
          }).format(date);
        } catch (e) {
          return String(dateString);
        }
      }

      function handleAuthExpiryIfNeeded(error) {
        var msg = String((error && error.message) || '');
        var lower = msg.toLowerCase();
        if (lower.indexOf('invalid or expired auth token') > -1 || lower.indexOf('authtoke') > -1) {
          try {
            sessionStorage.removeItem('inventoryLoginToken');
            localStorage.removeItem('inventoryLoggedInUser');
          } catch (e) {}
          alert('세션이 만료되었습니다. 다시 로그인해주세요.');
          goToMenu();
          return true;
        }
        return false;
      }

      function goToMenu() {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'inventory-nav-menu' }, '*');
        }
      }
     
      function renderStatusTabs(containerId, activeKey, onClickHandlerName) {
        var container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = STATUS_TABS.map(function(tab) {
          var activeClass = tab.key === activeKey ? 'active' : '';
          return `<button type="button" class="status-tab ${activeClass}" data-status="${tab.key}" onclick="${onClickHandlerName}('${tab.key}')">${tab.label}</button>`;
        }).join('');
      }

      function getStatusCount(stats, statusKey) {
        var s = stats || {};
        if (statusKey === 'Total') {
          return Number(s.In || 0) + Number(s.Out || 0) + Number(s.Problem || 0) + Number(s.Unknown || 0);
        }
        return Number(s[statusKey] || 0);
      }

      function toSortedEntriesByStatus(mapByStatus, activeStatus) {
        var entries = Object.entries(mapByStatus || {}).map(function(pair) {
          var name = pair[0];
          var stats = pair[1] || {};
          return { name: name, count: getStatusCount(stats, activeStatus), stats: stats };
        }).filter(function(row) { return row.count > 0; });
        entries.sort(function(a, b) { return b.count - a.count; });
        return entries;
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function getSectionStatusClass(statusKey) {
        var key = String(statusKey || 'Total').toLowerCase();
        if (key !== 'in' && key !== 'out' && key !== 'problem') key = 'total';
        return 'status-' + key;
      }

      function applySectionStatus(containerId, statusKey) {
        var section = document.getElementById(containerId);
        if (!section) return;
        section.classList.remove('status-total', 'status-in', 'status-out', 'status-problem');
        section.classList.add(getSectionStatusClass(statusKey));
      }

      function renderCountList(containerId, mapByStatus, activeStatus, emptyText) {
        var container = document.getElementById(containerId);
        if (!container) return;
        var rows = toSortedEntriesByStatus(mapByStatus, activeStatus);
        if (!rows.length) {
          container.innerHTML = `<div class="loading">${emptyText}</div>`;
          return;
        }
        container.innerHTML = rows.map(function(row) {
          return `<div class="list-item"><span>${row.name}</span><span class="badge" style="background:#e2e8f0">${row.count}</span></div>`;
        }).join('');
      }

      function renderTypeExpandableList(containerId, typeMapByStatus, modelsByTypeMapByStatus, activeStatus, emptyText) {
        var container = document.getElementById(containerId);
        if (!container) return;
        var rows = toSortedEntriesByStatus(typeMapByStatus, activeStatus);
        if (!rows.length) {
          container.innerHTML = `<div class="loading">${emptyText}</div>`;
          return;
        }
        container.innerHTML = rows.map(function(row) {
          var safeType = escapeHtml(row.name);
          var encodedType = encodeURIComponent(String(row.name || ''));
          var isExpanded = Boolean(expandedTypes[row.name]);
          var icon = isExpanded ? '&minus;' : '+';
          var modelMap = (modelsByTypeMapByStatus && modelsByTypeMapByStatus[row.name]) ? modelsByTypeMapByStatus[row.name] : {};
          var modelRows = isExpanded ? toSortedEntriesByStatus(modelMap, activeStatus) : [];
          var subHtml = '';
          if (isExpanded) {
            if (!modelRows.length) subHtml = '<div class="sub-list"><div class="loading">No model stats</div></div>';
            else {
              subHtml = '<div class="sub-list">' + modelRows.map(function(modelRow) {
                return `<div class="list-item"><span>${escapeHtml(modelRow.name)}</span><span class="badge" style="background:#e2e8f0">${modelRow.count}</span></div>`;
              }).join('') + '</div>';
            }
          }
          return `
            <div>
              <button type="button" class="type-row-btn list-item" data-type="${encodedType}">
                <div class="type-row-main">
                  <span class="type-name">${safeType}</span>
                  <span class="type-row-right"><span class="badge" style="background:#e2e8f0">${row.count}</span><span class="toggle-icon">${icon}</span></span>
                </div>
              </button>
              ${subHtml}
            </div>
          `;
        }).join('');
        Array.prototype.forEach.call(container.querySelectorAll('.type-row-btn'), function(btn) {
          btn.addEventListener('click', function() {
            var typeName = decodeURIComponent(btn.getAttribute('data-type') || '');
            expandedTypes[typeName] = !expandedTypes[typeName];
            renderTypeExpandableList(containerId, typeMapByStatus, modelsByTypeMapByStatus, activeStatus, emptyText);
          });
        });
      }

      function setSummaryCards(data) {
        var d = data || {};
        document.getElementById('totalItems').textContent = Number(d.totalItems || 0);
        document.getElementById('inStock').textContent = Number(d.inStock || 0);
        document.getElementById('outStock').textContent = Number(d.outStock || 0);
        document.getElementById('problemItems').textContent = Number(d.problemItems || 0);
      }

      function applyDashboardView() {
        if (!latestDashboardData) return;
        setSummaryCards(latestDashboardData);
        renderTypeExpandableList(
          'typeStats',
          latestDashboardData.typeCountsByStatus || {},
          latestDashboardData.modelsByTypeCountsByStatus || {},
          typeStatusTab,
          'No item stats'
        );
        renderCountList('locationStats', latestDashboardData.locationCountsByStatus || {}, locationStatusTab, 'No location stats');
        applySectionStatus('itemsSection', typeStatusTab);
        applySectionStatus('locationsSection', locationStatusTab);
      }

      function onTypeStatusTabClick(statusKey) {
        typeStatusTab = statusKey;
        renderStatusTabs('typeTabs', typeStatusTab, 'onTypeStatusTabClick');
        applyDashboardView();
      }

      function onLocationStatusTabClick(statusKey) {
        locationStatusTab = statusKey;
        renderStatusTabs('locationTabs', locationStatusTab, 'onLocationStatusTabClick');
        applyDashboardView();
      }
     
      function loadDashboard() {
        document.getElementById('typeStats').innerHTML = '<div class="loading">Loading...</div>';
        document.getElementById('locationStats').innerHTML = '<div class="loading">Loading...</div>';
        document.getElementById('recentActivity').innerHTML = '<div class="loading">Loading...</div>';
       
        callApiGet('getDashboardStats')
          .then(function(data) {
            if (isApiErrorObject(data)) {
              throw new Error(data.message);
            }
            updateDashboard(data || {});
          })
          .catch((error) => {
            console.error('Dashboard data loading error:', error); // Log the full error object
            if (handleAuthExpiryIfNeeded(error)) {
              console.log('Auth expiry handled, redirecting.');
              return;
            }
            var msg = `Error loading data: ${error.message || error}`;
            document.getElementById('typeStats').innerHTML = `<div style="color:red">${msg}</div>`;
            document.getElementById('locationStats').innerHTML = `<div style="color:red">${msg}</div>`;
            document.getElementById('recentActivity').innerHTML = `<div style="color:red">${msg}</div>`;
          });
      }
     
      function updateDashboard(data) {
        latestDashboardData = data || {};
        renderStatusTabs('typeTabs', typeStatusTab, 'onTypeStatusTabClick');
        renderStatusTabs('locationTabs', locationStatusTab, 'onLocationStatusTabClick');
        applyDashboardView();
       
        let activityHtml = '';
        const recent = data.recentActivity || [];
        if (recent.length === 0) {
          activityHtml = '<div class="loading">No recent activity</div>';
        } else {
          recent.forEach(act => {
            const date = act.date
              ? (typeof window.formatDateTimeDisplay === 'function'
                ? window.formatDateTimeDisplay(act.date)
                : formatDateTimeDisplayLocal(act.date))
              : 'Unknown';
            activityHtml += `
              <div class="activity-item">
                <div><strong>${act.item}</strong> - ${act.action}</div>
                <div style="color:#64748b; font-size:12px">${date} by ${act.user}</div>
              </div>
            `;
          });
        }
        document.getElementById('recentActivity').innerHTML = activityHtml;
        setTimeout(notifyParentHeight, 0);
      }
     
      function notifyParentHeight() {}
      function startAutoHeightReporter() {}

      window.onload = function() {
        if (!getAuthToken()) { goToMenu(); return; }
        loadDashboard();
        startAutoHeightReporter();
        setTimeout(notifyParentHeight, 60);
      };
      window.addEventListener('resize', notifyParentHeight);
    </script>
  </body>
</html>
