<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        padding: 24px;
      }
      .card {
        max-width: 560px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      }
      h2 {
        margin: 0 0 10px;
        font-size: 22px;
      }
      p {
        margin: 0 0 16px;
        color: #475569;
        line-height: 1.5;
      }
      .btn {
        width: 100%;
        border: none;
        border-radius: 10px;
        padding: 12px 16px;
        font-weight: 700;
        cursor: pointer;
      }
      .primary {
        background: #2563eb;
        color: #fff;
      }
      .secondary {
        margin-top: 10px;
        background: #475569;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>QR / Barcode Scanner</h2>
      <p>이 페이지에서는 카메라 스캔을 직접 실행하지 않습니다.</p>
      <p>This page does not run camera scanning directly.</p>
      <p><strong>QR 등록 Add / QR 이동 Move</strong> 버튼을 메인 메뉴에서 눌러 외부 스캐너를 열어주세요.</p>
      <button class="btn primary" onclick="goBack()">← 메인 메뉴 Main Menu</button>
      <button class="btn secondary" onclick="window.location.reload()">새로고침 Reload</button>
    </div>
    <script>
      const APP_ORIGIN = window.location.origin;
      function goBack() {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'inventory-nav-menu' }, APP_ORIGIN);
        }
      }
    </script>
  </body>
</html>
